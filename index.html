<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart project</title>
    <!-- Bootstrap CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <!-- Google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Site css -->
     <link rel="stylesheet" href="./css/style.css">
     <!-- js -->
      <script src="./js/script.js" defer></script>
</head>
<body>
    <div class="container-fluid">
        <div class="container pb-5">
            <h1 class="text-center h2 mt-3">Marwan Shopping Cart</h1>

            <div class="row mt-5 justify-content-center align-items-center">
                <div class="col-md-3">
                    <img src="./images/macbook-air-m1-chip-gray-1-500x500.png" alt="" class="img-fluid mx-auto d-block" width="200">
                    <h2 class="text-center h6 mt-3">Apple Macbook</h2>
                </div>
                <div class="col-md-4">
                    <div class="d-flex justify-content-center align-items-center">
                        <button onclick="handleProductChange('laptop',false)" class="btn btn-danger px-3">-</button>
                        <input id="laptop-count" type="text" name="" id="" value="1" class="text-center form-control">
                        <button onclick="handleProductChange('laptop',true)" class="btn btn-success px-3">+</button>
                    </div>
                </div>
                <div class="col-md-5">
                    <h3 class="h3 text-center text-muted">$<span  id="laptop-total">1599</span></h3>
                </div>
            </div>


            <div class="row mt-5 justify-content-center align-items-center">
                <div class="col-md-3">
                    <img src="./images/apple-iphone-17-lavender-official-image.webp" alt="" width="170" class="img-fluid mx-auto d-block">
                    <h2 class="text-center h6 mt-3">Apple iphone 17</h2>
                </div>
                <div class="col-md-4">
                    <div class="d-flex justify-content-center align-items-center">
                        <button onclick="handleProductChange('phone',false)" class="btn btn-danger px-3">-</button>
                        <input id="phone-count" type="text" name="" id="" value="1" class="text-center form-control">
                        <button onclick="handleProductChange('phone',true)" class="btn btn-success px-3">+</button>
                    </div>
                </div>
                <div class="col-md-5">
                    <h3 class="h3 text-center text-muted">$<span id="phone-total">999</span></h3>
                </div>
            </div>

            <div class="d-flex justify-content-center align-items-center">
                <div class="col-md-8">
                    <h2 class="h5">SubTotal</h2>
                    <h2 class="h5">TAX</h2>
                    <h2 class="h5">Grand Total</h2>
                </div>
                <div class="col-md-4">
                <h2 class="h5 text-center">$<span id="sub-total">2598</span></h2>
                <h2 class="h5 text-center">$<span id="tax-amount">164.97</span></h2>
                <h2 class="h5 text-center">$<span id="grand-total">2762.97</span></h2>
                </div>
                

            </div>
        </div>
    </div>
</body>
</html>
